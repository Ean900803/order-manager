{% extends "base.html" %}
{% load form_tags %}
{% block title %}{{ action }}分類{% endblock %}
{% block content %}
<div class="d-flex align-items-center gap-2 mb-4">
  <a href="{% url 'catalog:category_list' %}" class="btn btn-sm btn-outline-secondary">
    <i class="bi bi-arrow-left"></i>
  </a>
  <h5 class="fw-bold mb-0">{{ action }}分類</h5>
</div>

<div class="card border-0 shadow-sm" style="max-width:420px;">
  <div class="card-body p-4">
    <form method="post" novalidate>
      {% csrf_token %}
      <div class="mb-4">
        <label class="form-label fw-semibold">分類名稱 <span class="text-danger">*</span></label>
        {{ form.name|bs5 }}
        {% if form.name.errors %}
        <div class="text-danger small mt-1">{{ form.name.errors.0 }}</div>
        {% endif %}
      </div>
      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary px-4">
          <i class="bi bi-check-lg me-1"></i>儲存
        </button>
        <a href="{% url 'catalog:category_list' %}" class="btn btn-outline-secondary">取消</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
