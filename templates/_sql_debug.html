{% if sql %}
<div class="mt-3">
  <button class="btn btn-sm btn-outline-info" type="button" data-bs-toggle="collapse" data-bs-target="#sqlDebug" aria-expanded="false">
    <i class="bi bi-code-slash me-1"></i>顯示 / 隱藏 生成的 SQL
  </button>
  <div class="collapse mt-2" id="sqlDebug">
    <div class="card card-body bg-dark text-light small" style="font-family:monospace;">
      <pre class="mb-0" style="white-space:pre-wrap;">{{ sql }}</pre>
    </div>
  </div>
</div>
{% endif %}
